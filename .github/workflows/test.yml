name: Unit Tests
concurrency:
  group: Unit Tests
  cancel-in-progress: false

on:
  push:
    paths:
      - src
      - examples
      - include
      - tests
  pull_request:
    paths:
      - src
      - examples
      - include
      - tests

jobs:
  check-single-header:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Regenerate Header
        run: python tools/amalgamate.py src/engine.hpp include/qjswrap.hpp src
      - name: Check for Changes
        run: git diff --exit-code include/qjswrap.hpp
  windows:
    runs-on: windows-latest
    needs: check-single-header
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true
          actions-cache-key: ${{ runner.os }}-xmake-${{ hashFiles('xmake.lua') }}
      - name: Build
        run: xmake -y
      - name: Run Unit Tests
        run: xmake run tests
  mac:
    runs-on: macos-latest
    needs: check-single-header
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install LLVM (macOS only)
        run: brew install llvm
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true
          actions-cache-key: ${{ runner.os }}-xmake-${{ hashFiles('xmake.lua') }}
      - name: Configure xmake
        run: xmake f --toolchain=llvm --sdk=$(brew --prefix llvm) -y
      - name: Build
        run: xmake -y
      - name: Run Unit Tests
        run: xmake run tests
  linux:
    runs-on: ubuntu-latest
    needs: check-single-header
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Setup Linux Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 --slave /usr/bin/g++ g++ /usr/bin/g++-14
          sudo update-alternatives --set gcc /usr/bin/gcc-14
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true
          actions-cache-key: ${{ runner.os }}-xmake-${{ hashFiles('xmake.lua') }}
      - name: Build
        run: xmake -y
      - name: Run Unit Tests
        run: xmake run tests