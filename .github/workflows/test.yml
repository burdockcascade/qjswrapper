name: Tests

on: [push, pull_request]

jobs:

  windows:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Configure CMake
        run: cmake -B ${{ github.workspace }}/build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config Release
      - name: Run Unit Tests
        run: ${{ github.workspace }}\build\Release\unit-tests.exe

  mac:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Configure CMake
        run: cmake -B ${{ github.workspace }}/build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build Target
        run: cmake --build ${{ github.workspace }}/build --config Release
      - name: Run Tests
        run: ${{ github.workspace }}/build/unit-tests

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake g++-14 libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev
      - name: Configure CMake
        run: cmake -B ${{ github.workspace }}/build -S . -DCMAKE_BUILD_TYPE=Release
        env:
          CXX: g++-14
      - name: Build Target
        run: cmake --build ${{ github.workspace }}/build --config Release
      - name: Run Tests
        run: ${{ github.workspace }}/build/unit-tests