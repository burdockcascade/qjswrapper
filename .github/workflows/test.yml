name: Tests
concurrency:
  group: Tests
  cancel-in-progress: false

on: [push, pull_request]

jobs:
  check-single-header:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Regenerate Header
        run: python tools/amalgamate.py src/engine.hpp include/qjswrapper.hpp src
      - name: Check for Changes
        run: git diff --exit-code include/qjswrapper.hpp

  windows:
    runs-on: windows-latest
    needs: check-single-header
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Run Unit Tests
        run: .\build\tests\Release\unit-tests.exe

  mac:
    runs-on: macos-latest
    needs: check-single-header
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Run Unit Tests
        run: ./build/tests/unit-tests

  linux:
    runs-on: ubuntu-latest
    needs: check-single-header
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake g++-14 libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        env:
          CXX: g++-14
      - name: Build
        run: cmake --build build --config Release
      - name: Run Unit Tests
        run: ./build/tests/unit-tests