name: C++ CI

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
      - name: Configure and Build
        run: |
          xmake f -y
          xmake -y
      - name: Run Math Tests
        run: xmake run test_math
      - name: Run Ship Tests
        run: xmake run test_ship